<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QC Assistant DEV3 Clean</title>
  <style>
    body { width: 430px; margin: 0; padding: 18px; font-family: Arial, sans-serif; background: #fff3f8; color: #111827; }
    h2 { margin: 0 0 16px; text-align: center; color: #111827; }
    label { display: block; margin-top: 12px; font-weight: 600; font-size: 13px; }
    input[type="email"], input[type="number"], input[type="file"] { width: 100%; box-sizing: border-box; margin-top: 6px; padding: 9px; border-radius: 8px; border: 1px solid #ddd; background: #fff; }
    .row { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; }
    #emailError { display: none; margin-top: 6px; color: #dc2626; font-size: 12px; }
    #runQC { width: 100%; margin-top: 18px; padding: 14px; border: 0; border-radius: 12px; background: #ff3c86; color: #fff; font-weight: 700; font-size: 18px; cursor: pointer; }
    #runQC:disabled { opacity: 0.45; cursor: not-allowed; }
    #result { margin-top: 18px; padding: 14px; background: #fff; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.08); font-size: 14px; line-height: 1.4; }
    #downloadReport { padding: 10px 12px; border: 0; border-radius: 8px; background: #111827; color: #fff; cursor: pointer; font-weight: 700; }
  </style>
</head>
<body>
  <h2>QC Assistant DEV3 Clean</h2>

  <label for="qcEmail">PW Email *</label>
  <input id="qcEmail" type="email" placeholder="name@pw.live">
  <div id="emailError">Enter valid PW email ending with @pw.live</div>

  <label for="expectedCount">Expected Questions (optional)</label>
  <input id="expectedCount" type="number" placeholder="Optional manual count">

  <div class="row">
    <input id="hasVideoSolutions" type="checkbox">
    <span>This test contains video solutions</span>
  </div>

  <label for="pdfFile">Reference PDF (optional)</label>
  <input id="pdfFile" type="file" accept=".pdf">

  <label for="excelFile">Answer Key Excel (optional)</label>
  <input id="excelFile" type="file" accept=".xlsx,.xls,.csv">

  <button id="runQC" disabled>Run QC DEV3 Clean</button>

  <div id="result">
    Tests list page par raho ya Preview open karo, phir Run QC DEV3 Clean dabao.
  </div>

  <script src="pdf.min.js"></script>
  <script src="xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>

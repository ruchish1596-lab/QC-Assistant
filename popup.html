<head>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <h2>QC Assistant DEV v2.0</h2>

    <div class="file-box">
      <label>PW Email *</label>
      <input id="qcEmail" type="email" placeholder="your.name@pw.live">
      <small id="emailError" style="color:#d32f2f; display:none;">Enter valid PW email ending with @pw.live</small>
    </div>

    <label style="display:block; margin:10px 0;">
      <input type="checkbox" id="hasVideoSolutions">
      This test contains video solutions
    </label>

    <input id="expectedCount" type="number" placeholder="Expected Questions (optional)">

    <div class="file-box">
      <label>Reference PDF (optional)</label>
      <input type="file" id="pdfFile" accept=".pdf">
    </div>

    <div class="file-box">
      <label>Answer Key Excel (optional)</label>
      <input type="file" id="excelFile" accept=".xlsx,.xls,.csv">
    </div>

    <button id="runQC" disabled>Run QC 2.0</button>

    <div id="result"></div>
  </div>

  <script src="xlsx.full.min.js"></script>
  <script src="pdf.min.js"></script>
  <script src="popup.js"></script>
</body>
